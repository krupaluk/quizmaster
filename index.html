<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>quiz-master</title>
    <style>
        :root { --ios-blue: #007aff; --ios-bg: #f2f2f7; --ios-card: #ffffff; --ios-text: #000000; --ios-gray: #8e8e93; --soft-green: #f2faf5; --soft-red: #fff5f5; --border-green: #34c759; --border-red: #ff3b30; --neutral-bg: #f8f8f8; --neutral-border: #d1d1d6; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: var(--ios-bg); color: var(--ios-text); margin: 0; padding: 10px; display: flex; justify-content: center; }
        #app { width: 100%; max-width: 500px; display: flex; flex-direction: column; }
        
        /* Status bar */
        .status-bar { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; margin-bottom: 12px; gap: 5px; }
        .header-mini { text-align: center; text-transform: uppercase; letter-spacing: 0.5px; color: var(--ios-gray); white-space: nowrap; margin-top: 12px; }
        .app-name { font-size: 11px; font-weight: 800; }
        .app-version { font-size: 9px; font-weight: 400; opacity: 0.6; margin-left: 2px; text-transform: none; }
        .stats-group { display: flex; gap: 6px; justify-self: end; }
        .stat-item { display: flex; flex-direction: column; align-items: center; gap: 2px; }
        .stat-label { font-size: 8px; text-transform: uppercase; color: var(--ios-gray); font-weight: 700; letter-spacing: 0.2px; }

        .badge { display: inline-block; padding: 4px 8px; border-radius: 8px; font-size: 13px; font-weight: 700; min-width: 32px; text-align: center; }
        .badge-gray { background: #d1d1d6; color: #3a3a3c; }
        .badge-green { background: var(--border-green); color: white; }
        .badge-red { background: var(--border-red); color: white; }
        
        .exit-badge { 
            background: #e5e5ea; color: #3a3a3c; border: none; 
            padding: 7px 12px; border-radius: 10px; font-size: 10px; 
            font-weight: 800; cursor: pointer; text-transform: uppercase;
            justify-self: start; transition: all 0.1s; margin-top: 10px;
        }
        .exit-badge:active { background: #d1d1d6; transform: scale(0.96); }

        .card { background: var(--ios-card); border-radius: 25px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin-bottom: 15px; position: relative; overflow: hidden; min-height: 200px; }
        .progress-container { position: absolute; top: 0; left: 0; width: 100%; height: 4px; background: #e5e5ea; }
        .progress-bar { height: 100%; background: var(--ios-blue); width: 0%; transition: width 0.4s ease; }

        .quiz-topic-info { font-size: 13px; color: var(--ios-gray); margin-bottom: 15px; line-height: 1.4; margin-top: 5px; }
        .question-text { font-size: 23px; font-weight: 700; margin-bottom: 25px; line-height: 1.25; }
        .ans-group { margin-bottom: 12px; }
        .btn { display: block; width: 100%; padding: 18px 20px; border: none; border-radius: 20px; font-size: 19px; font-weight: 500; cursor: pointer; transition: all 0.2s; text-align: left; background: var(--ios-bg); color: var(--ios-blue); }
        .btn-next { background: var(--ios-blue); color: white; text-align: center; font-weight: 600; width: 100%; padding: 18px; border-radius: 20px; border: none; font-size: 19px; margin-top: 10px; display: none; }
        
        /* Design pro potvrzení ukončení */
        #exit-confirm-ui { text-align: center; padding: 10px 0; }
        .exit-warning-title { color: var(--border-red); font-size: 24px; font-weight: 800; margin-bottom: 10px; }
        .countdown-circle { font-size: 60px; font-weight: 800; color: var(--ios-gray); margin: 15px 0; }

        .sub-expl { max-height: 0; overflow: hidden; transition: max-height 0.4s ease, padding 0.3s ease; font-size: 16px; line-height: 1.4; color: #333; margin: 0 5px; border-left: 4px solid transparent; background: var(--neutral-bg); }
        .sub-expl.show { max-height: 400px; margin-top: 10px; margin-bottom: 12px; padding: 12px 15px; border-left-color: var(--neutral-border); }
        .sub-expl.highlight-correct { background: var(--soft-green) !important; border-left-color: var(--border-green) !important; }
        .sub-expl.highlight-wrong { background: var(--soft-red) !important; border-left-color: var(--border-red) !important; }
        .btn.correct-btn { background: var(--border-green) !important; color: white !important; }
        .btn.wrong-btn { background: var(--border-red) !important; color: white !important; }
        
        select { width: 100%; padding: 18px; border-radius: 15px; border: 1px solid #ddd; font-size: 19px; background: #fff; margin-bottom: 20px; appearance: none; text-align: center; }
        .hidden { display: none !important; }
        .grade-display { font-size: 85px; font-weight: 800; color: var(--ios-blue); margin: 20px 0; text-align: center; }
        .hub-item, .setup-option { display: flex; align-items: center; padding: 12px; background: var(--ios-bg); margin-bottom: 8px; border-radius: 15px; cursor: pointer; }
        .hub-item input, .setup-option input { margin-right: 15px; transform: scale(1.5); }
    </style>
</head>
<body>

<div id="app">
    <!-- HUB -->
    <div id="sc-hub" class="screen">
        <header style="text-align: center; margin-bottom: 15px; color: var(--ios-gray);">
            <span class="app-name">QUIZ-MASTER</span><span class="app-version">(v1.10)</span>
        </header>
        <div class="card">
            <h2 style="font-size: 26px; text-align: center;">Vyberte témata</h2>
            <div id="hub-list" style="margin-bottom: 20px;"></div>
            <button class="btn" style="background: var(--ios-blue); color:white; text-align:center" onclick="loadAndGoToSetup()">Pokračovat</button>
        </div>
    </div>

    <!-- SETUP -->
    <div id="sc-setup" class="screen hidden">
        <header style="text-align: center; margin-bottom: 15px; color: var(--ios-gray);">
            <span class="app-name">QUIZ-MASTER</span><span class="app-version">(v1.10)</span>
        </header>
        <div class="card">
            <h2 style="font-size: 26px; text-align: center;">Nastavení</h2>
            <p style="color: var(--ios-gray); margin-bottom: 15px; text-align: center;">Počet otázek:</p>
            <select id="sel-count"></select>
            <div class="setup-option" onclick="document.getElementById('chk-shuffle').click(); event.stopPropagation();">
                <input type="checkbox" id="chk-shuffle" checked onclick="event.stopPropagation();">
                <span style="font-size: 17px; font-weight: 500;">Náhodné pořadí otázek</span>
            </div>
            <button class="btn" style="background: var(--ios-blue); color:white; text-align:center; margin-top: 15px;" onclick="startQuiz()">Spustit test</button>
            <button class="exit-badge" style="width: 100%; margin-top: 15px; padding: 18px;" onclick="location.reload()">Zpět k výběru témat</button>
        </div>
    </div>

    <!-- QUIZ -->
    <div id="sc-quiz" class="screen hidden">
        <div class="status-bar">
            <button id="btn-exit-trigger" class="exit-badge" onclick="requestExit()">Ukončit</button>
            <div class="header-mini"><span class="app-name">QUIZ-MASTER</span><span class="app-version">(v1.10)</span></div>
            <div class="stats-group">
                <div class="stat-item"><span class="stat-label">zbývá</span><span id="quiz-remaining" class="badge badge-gray">0</span></div>
                <div class="stat-item"><span class="stat-label">správně</span><span id="count-correct" class="badge badge-green">0</span></div>
                <div class="stat-item"><span class="stat-label">špatně</span><span id="count-wrong" class="badge badge-red">0</span></div>
            </div>
        </div>
        
        <div class="card">
            <div class="progress-container"><div id="p-bar" class="progress-bar"></div></div>
            
            <div id="quiz-main-ui">
                <div id="q-topic" class="quiz-topic-info"></div>
                <div id="q-text" class="question-text"></div>
                <div id="ans-container"></div>
                <button id="btn-continue" class="btn-next" onclick="next()">Pokračovat</button>
            </div>

            <div id="exit-confirm-ui" class="hidden">
                <div class="exit-warning-title">Ukončit test?</div>
                <p style="color: var(--ios-gray); font-size: 15px;">Váš pokrok bude smazán.</p>
                <div id="exit-countdown" class="countdown-circle">10</div>
                <button class="btn" style="background: var(--ios-blue); color:white; text-align:center" onclick="cancelExit()">Zůstat u testu</button>
                <button class="exit-badge" style="width: 100%; margin-top: 15px; padding: 12px; background: none; color: var(--border-red);" onclick="location.reload()">Ano, ukončit hned</button>
            </div>
        </div>
    </div>

    <!-- RESULTS -->
    <div id="sc-res" class="screen hidden">
        <div class="card">
            <h2 style="text-align: center;">Výsledek</h2>
            <div id="res-grade" class="grade-display"></div>
            <p id="res-stat" style="font-size: 19px; text-align: center;"></p>
            <div id="res-retry" class="hidden">
                <p id="res-retry-msg" style="color: var(--border-red); font-weight: 600; text-align: center; margin-bottom: 15px;"></p>
                <button class="btn" style="background: var(--ios-blue); color:white; text-align:center" onclick="startErrorLoop()">Opravit chyby</button>
            </div>
            <button class="exit-badge" style="width: 100%; margin-top: 20px; padding: 18px;" onclick="location.reload()">Nový test</button>
        </div>
    </div>
</div>

<script src="quizMaster_config.js"></script>

<script>
let db = [];
let activeQ = [], cur = 0, score = 0, errs = [], loop = false, total = 0;
let sessCorrect = 0, sessWrong = 0, selectedTopicName = "";
let exitTimer = null;

function initHub() {
    const list = document.getElementById('hub-list');
    if (typeof availableQuizzes !== 'undefined') {
        availableQuizzes.forEach(q => {
            const div = document.createElement('div');
            div.className = 'hub-item';
            div.innerHTML = `<input type="checkbox" value="${q.id}" data-file="${q.file}" data-title="${q.title}" class="quiz-check"> <span>${q.title}</span>`;
            div.onclick = (e) => { if(e.target.tagName !== 'INPUT') { const ch = div.querySelector('input'); ch.checked = !ch.checked; } };
            list.appendChild(div);
        });
    } else {
        list.innerHTML = "<p style='color:red'>Chyba: config.js nenalezen!</p>";
    }
}

async function loadAndGoToSetup() {
    const checks = Array.from(document.querySelectorAll('.quiz-check:checked'));
    if (checks.length === 0) return alert("Vyberte aspoň jedno téma!");
    selectedTopicName = (checks.length === 1) ? checks[0].getAttribute('data-title') : "Kombinace vybraných témat";
    db = [];
    for (let ch of checks) {
        const file = ch.getAttribute('data-file'), id = ch.value;
        await new Promise((resolve) => {
            const old = document.querySelector(`script[data-id="${id}"]`); if (old) old.remove();
            const s = document.createElement('script'); s.src = file; s.setAttribute('data-id', id);
            s.onload = () => { setTimeout(() => {
                const raw = window['data_' + id];
                if (raw) db = db.concat(raw.questions || (Array.isArray(raw) ? raw : []));
                resolve();
            }, 50); };
            s.onerror = () => resolve();
            document.head.appendChild(s);
        });
    }
    if (db.length === 0) return alert("Chyba při načítání.");
    const sel = document.getElementById('sel-count'); sel.innerHTML = '';
    const maxQ = db.length;
    if (maxQ < 5) { let o = document.createElement('option'); o.value = maxQ; o.text = maxQ; sel.add(o); }
    else { for(let i=5; i<=maxQ; i+=5) { let o = document.createElement('option'); o.value=i; o.text=i; sel.add(o); }
    if (maxQ % 5 !== 0) { let o = document.createElement('option'); o.value=maxQ; o.text=maxQ; sel.add(o); } }
    showScreen('sc-setup');
}

function shuffle(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
}

function startQuiz() {
    total = parseInt(document.getElementById('sel-count').value);
    activeQ = [...db];
    if (document.getElementById('chk-shuffle').checked) shuffle(activeQ);
    activeQ = activeQ.slice(0, total);
    cur = 0; score = 0; errs = []; loop = false; sessCorrect = 0; sessWrong = 0;
    updateStats(); showScreen('sc-quiz'); render();
}

function updateStats() {
    const rem = document.getElementById('quiz-remaining');
    if (rem) rem.innerText = total - cur;
    document.getElementById('count-correct').innerText = sessCorrect;
    document.getElementById('count-wrong').innerText = sessWrong;
    const prog = (cur / total) * 100;
    document.getElementById('p-bar').style.width = prog + "%";
}

function render() {
    cancelExit();
    const q = activeQ[cur];
    document.getElementById('q-topic').innerHTML = `<b>Téma</b> → ${selectedTopicName}`;
    document.getElementById('q-text').innerText = q.q;
    document.getElementById('btn-continue').style.display = 'none';
    const box = document.getElementById('ans-container'); box.innerHTML = '';
    let keys = ['a', 'b', 'c']; shuffle(keys);
    keys.forEach(k => {
        const group = document.createElement('div'); group.className = 'ans-group';
        const b = document.createElement('button'); b.className = 'btn'; b.innerText = q[k]; b.id = 'btn-' + k; b.onclick = () => check(k);
        const ex = document.createElement('div'); ex.className = 'sub-expl'; ex.id = 'ex-' + k; ex.innerText = q.expl[k];
        group.appendChild(b); group.appendChild(ex); box.appendChild(group);
    });
}

function check(k) {
    const q = activeQ[cur];
    ['a', 'b', 'c'].forEach(key => { const btn = document.getElementById('btn-' + key); if (btn) btn.onclick = () => toggleExpl(key); });
    const sBtn = document.getElementById('btn-' + k), sEx = document.getElementById('ex-' + k);
    const cBtn = document.getElementById('btn-' + q.ans), cEx = document.getElementById('ex-' + q.ans);
    if (k === q.ans) { sBtn.classList.add('correct-btn'); sEx.classList.add('show', 'highlight-correct'); if (!loop) { score++; sessCorrect++; } }
    else { sBtn.classList.add('wrong-btn'); sEx.classList.add('show', 'highlight-wrong'); cBtn.classList.add('correct-btn'); cEx.classList.add('show', 'highlight-correct'); errs.push(q); if (!loop) sessWrong++; }
    updateStats(); document.getElementById('btn-continue').style.display = 'block';
}

function toggleExpl(k) { const ex = document.getElementById('ex-' + k); if (ex) ex.classList.toggle('show'); }

function next() {
    cur++;
    if(cur < activeQ.length) { updateStats(); render(); }
    else { document.getElementById('p-bar').style.width = "100%"; finish(); }
}

function finish() {
    showScreen('sc-res');
    if(!loop) {
        const p = (score / total) * 100;
        let g = p >= 90 ? 'A' : p >= 80 ? 'B' : p >= 70 ? 'C' : p >= 60 ? 'D' : p >= 50 ? 'E' : 'F';
        document.getElementById('res-grade').innerText = g;
        document.getElementById('res-stat').innerHTML = `Úspěšnost: <b>${score} / ${total}</b> (${Math.round(p)}%)`;
    } else {
        document.getElementById('res-grade').innerText = errs.length === 0 ? "✓" : "!";
        document.getElementById('res-stat').innerText = errs.length === 0 ? "Všechny chyby byly opraveny!" : `Stále zbývá opravit ${errs.length} chyb.`;
    }
    document.getElementById('res-retry').className = errs.length > 0 ? '' : 'hidden';
    document.getElementById('res-retry-msg').innerText = loop ? `Zbývá opravit ${errs.length} chyb.` : "Máte chyby. Musíte je opravit.";
}

function startErrorLoop() { activeQ = [...errs]; errs = []; cur = 0; loop = true; showScreen('sc-quiz'); render(); }

function requestExit() {
    document.getElementById('quiz-main-ui').classList.add('hidden');
    document.getElementById('exit-confirm-ui').classList.remove('hidden');
    document.getElementById('btn-exit-trigger').classList.add('hidden');
    
    let seconds = 10;
    document.getElementById('exit-countdown').innerText = seconds;
    
    exitTimer = setInterval(() => {
        seconds--;
        document.getElementById('exit-countdown').innerText = seconds;
        if (seconds <= 0) {
            clearInterval(exitTimer);
            location.reload();
        }
    }, 1000);
}

function cancelExit() {
    if (exitTimer) clearInterval(exitTimer);
    document.getElementById('quiz-main-ui').classList.remove('hidden');
    document.getElementById('exit-confirm-ui').classList.add('hidden');
    const exitBtn = document.getElementById('btn-exit-trigger');
    if (exitBtn) exitBtn.classList.remove('hidden');
}

function showScreen(id) { 
    ['sc-hub', 'sc-setup', 'sc-quiz', 'sc-res'].forEach(s => { 
        const el = document.getElementById(s); 
        if (el) el.classList.add('hidden'); 
    }); 
    const t = document.getElementById(id); 
    if (t) t.classList.remove('hidden'); 
}

initHub();
</script>
</body>
</html>
